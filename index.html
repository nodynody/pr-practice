<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>갸루 메이커 ~미나 육성계획~</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" />
<style>
  :root{
    --gold:#e3c46a; --gold-lt:#f6e39a; --gold-dk:#a67c2e;
    --red1:#5c1616; --red2:#3d0d0d; --red3:#7a2222; --redbar:#e42323; --redbar-dk:#7a1010;
    --parch:#e9dcbb; --parch-dk:#cbb787; --inkred:#4a0f0f;
    --panel-ink:#2a0808;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  body{
    font-family:"Galmuri11","DungGeunMo","Neo둥근모",monospace;
    background:
      radial-gradient(circle at 50% 40%, #2a0e0e 0, #140505 70%, #080202 100%);
    background-attachment:fixed;
    color:var(--parch); min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:14px;
    image-rendering:pixel, -webkit-crisp-edges;
    -webkit-font-smoothing:none;
  }
  .hidden{display:none !important;}
  button{font-family:inherit;}

  /* ===== ornate gold-on-red frame ===== */
  .pm-frame{
    position:relative;
    background:linear-gradient(180deg,var(--red1),var(--red2));
    border:2px solid var(--gold);
    box-shadow:
      inset 0 0 0 2px var(--red3),
      inset 0 0 0 3px var(--gold-dk),
      inset 0 0 14px rgba(0,0,0,.6),
      0 3px 0 rgba(0,0,0,.5);
    border-radius:4px; padding:8px;
  }
  .pm-frame::before,.pm-frame::after{
    content:"❖"; position:absolute; color:var(--gold-lt); font-size:11px; line-height:1;
    text-shadow:0 1px 0 #000; z-index:2;
  }
  .pm-frame::before{top:2px; left:4px;}
  .pm-frame::after{top:2px; right:4px;}

  /* ===== APP LAYOUT ===== */
  #game{
    width:min(1120px,100%);
    display:grid; grid-template-columns:322px 1fr 296px; gap:10px;
    align-items:start;
  }
  @media(max-width:900px){
    #game{grid-template-columns:1fr; max-width:560px; margin:0 auto;}
    /* 모바일: 캐릭터·메뉴(가운데 열)를 위로, 그다음 날짜·달력·대사, 마지막 능력치 */
    #game > .col:nth-child(2){order:0;}
    #game > .col:nth-child(1){order:1;}
    #game > .col:nth-child(3){order:2;}
  }
  .col{display:flex; flex-direction:column; gap:10px;}

  /* ===== DATE BOX ===== */
  .datebox{display:flex; align-items:stretch; gap:6px; padding:6px 8px;}
  .datebox .dl{display:flex; flex-direction:column; justify-content:center; gap:2px; padding:2px 6px;
    border-right:2px solid var(--gold-dk); font-size:13px; color:var(--gold-lt);}
  .datebox .dl .yr{color:var(--parch); font-size:12px;}
  .datebox .dl .wd{color:#ff9a9a;}
  .datebox .big{flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
    font-size:44px; color:var(--gold-lt); text-shadow:0 2px 0 #000, 0 0 8px rgba(227,196,106,.4);}
  .datebox .big small{font-size:14px; color:var(--parch-dk); align-self:flex-end; margin-bottom:8px;}

  /* ===== CALENDAR ===== */
  .cal .caltitle{text-align:center; color:var(--gold-lt); font-size:13px; padding:2px 0 5px;}
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:2px;}
  .calgrid .wd{font-size:10px; text-align:center; color:var(--parch-dk); padding:1px 0;}
  .calgrid .wd.sun{color:#ff8a8a;} .calgrid .wd.sat{color:#8ab6ff;}
  .calcell{
    aspect-ratio:1/1; background:#78c4e6; border:1px solid #2a0808; border-radius:2px;
    position:relative; overflow:hidden; display:flex; align-items:flex-start; justify-content:flex-start;
  }
  .calcell.empty{background:#1c0707; border-color:#120404;}
  .calcell .dnum{position:absolute; top:0; left:1px; font-size:9px; color:#1a2a3a; z-index:2; text-shadow:0 1px 0 #fff8;}
  .calcell .wx{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px;}
  .calcell.act{background:#f2d98a;}
  .calcell.act .wx{font-size:14px;}
  .calcell.wknd{background:#bfe0ef;}
  .calcell.cur{background:#78c4e6; box-shadow:inset 0 0 0 2px var(--gold-lt);}
  .week-badge{position:absolute; top:10px; left:10px; z-index:9; background:linear-gradient(180deg,var(--pink,#ff5fa2),var(--purple,#a05bff)); background:linear-gradient(180deg,#7a2020,#4a1010); color:var(--gold-lt); border:2px solid var(--gold); border-radius:999px; padding:5px 14px; font-size:15px; box-shadow:0 3px 0 #000;}

  /* ===== MESSAGE / STEWARD BOX ===== */
  .msg{display:flex; gap:8px; min-height:118px; align-items:stretch;}
  .msg .portrait{
    flex:0 0 74px; align-self:flex-end; border:2px solid var(--gold-dk); border-radius:3px;
    background:#120404; overflow:hidden;
  }
  .msg .portrait svg{display:block; width:74px; height:90px;}
  .msg .mtext{
    flex:1; background:linear-gradient(180deg,#1e0808,#120404); border:1px solid var(--gold-dk);
    border-radius:3px; padding:8px 10px; font-size:12.5px; line-height:1.7; color:#ffeede;
    display:flex; flex-direction:column; gap:5px; overflow:hidden;
  }
  .msg .mtext .who{color:var(--gold-lt); font-size:11px;}
  .msg .mtext .line .plus{color:#7be08a;} .msg .mtext .line .minus{color:#ff8f8f;}
  .msg .mtext .line b{color:#ffd98a;}
  .msg .mtext .ev{color:#ffd0e0;}

  /* ===== TOP PANEL (name / age / gold) ===== */
  .top{display:grid; grid-template-columns:1fr auto; gap:6px 10px; padding:8px 10px; align-items:center;}
  .top .nameplate{grid-column:1/3; text-align:center; color:var(--gold-lt); font-size:15px;
    border-bottom:2px solid var(--gold-dk); padding-bottom:4px; letter-spacing:1px;}
  .top .nameplate .title{color:#ffb0c8; font-size:12px; display:block;}
  .top .agebox{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--parch-dk);}
  .top .agebox .star{width:34px; height:34px; border:2px solid var(--gold-dk); border-radius:50%;
    background:radial-gradient(circle,#3a1010,#1a0606); display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--gold-lt);}
  .top .agebox .an{font-size:22px; color:var(--gold-lt);}
  .top .goldbox{justify-self:end; background:#1a0606; border:2px solid var(--gold-dk); border-radius:3px;
    padding:4px 10px; color:var(--gold-lt); font-size:15px;}
  .top .goldbox small{color:var(--parch-dk); font-size:10px;}
  .top .slots{grid-column:1/3; display:flex; gap:4px; justify-content:center; margin-top:2px;}
  .top .slots .slot{width:26px; height:26px; border:2px solid var(--gold-dk); border-radius:3px;
    background:#120404; display:flex; align-items:center; justify-content:center; font-size:13px; color:#5a3a3a;}
  .top .slots .slot.on{background:#2a1010; color:var(--gold-lt); text-shadow:0 0 6px var(--gold);}
  .top .catch{grid-column:1/3; text-align:center; background:#1a0606; border:1px solid var(--gold-dk);
    border-radius:3px; padding:3px; margin-top:3px; color:#ffe4b0; font-size:12px;}
  .top .catch .nums{color:var(--gold-lt); letter-spacing:1px;}

  /* ===== ROOM ===== */
  .room{
    position:relative; height:476px; border:2px solid var(--gold); border-radius:4px; overflow:hidden;
    box-shadow:inset 0 0 0 2px var(--red3), inset 0 0 0 3px var(--gold-dk);
    background-color:#4a1414;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><g fill='none' stroke='%236a2323' stroke-width='1.4'><path d='M24 6 C30 12 30 18 24 24 C18 18 18 12 24 6 Z'/><path d='M24 24 C30 30 30 36 24 42 C18 36 18 30 24 24 Z'/><path d='M0 24 C6 18 12 18 18 24 M48 24 C42 18 36 18 30 24'/></g></svg>");
    background-size:48px 48px;
  }
  .room .floor{position:absolute; left:0; right:0; bottom:0; height:80px;
    background:linear-gradient(180deg,#5a3a26,#3a2416); border-top:3px solid #6a4a30;}
  .room .picture{position:absolute; top:14px; left:22px;
    width:78px; height:64px; border:5px solid #3a1a0a; border-radius:3px; box-shadow:0 0 0 2px #8a6a3a, 0 4px 8px #000;}
  .room .bed{position:absolute; right:6px; bottom:70px; width:118px; height:52px;
    background:linear-gradient(180deg,#c98aa8,#9a5a78); border:3px solid #6a3a50; border-radius:8px 8px 4px 4px;}
  .room .bed::before{content:""; position:absolute; left:-3px; top:-14px; width:36px; height:26px;
    background:#e8d0dc; border:3px solid #6a3a50; border-radius:6px;}
  .room .stagelight{position:absolute; inset:0; background:radial-gradient(ellipse at 50% 86%, rgba(255,230,180,.10), transparent 55%); pointer-events:none;}
  .room .avatar-holder{position:absolute; left:50%; bottom:2px; transform:translateX(-50%); z-index:3;}
  .room .avatar-holder canvas,.room .avatar-holder svg{height:454px; width:auto; display:block; filter:drop-shadow(0 4px 5px rgba(0,0,0,.55));}
  .room .avatar-holder canvas{image-rendering:pixelated; image-rendering:crisp-edges;}

  /* ===== ACTIVITY SCENE ===== */
  .scene-layer{position:absolute; inset:0; z-index:10; display:none;}
  .scene-layer.show{display:block;}
  .scene{position:absolute; inset:0; overflow:hidden; background:#0a0608;}
  .sc-bg{position:absolute; inset:0; width:100%; height:100%; z-index:0;}
  .sc-fg{position:absolute; inset:0; width:100%; height:100%; z-index:3; pointer-events:none;}
  .sc-hero{position:absolute; left:50%; bottom:4px; transform:translateX(-50%); z-index:2;}
  .sc-hero.h-sit{bottom:-56px;}
  .sc-hero.h-sleep{bottom:118px; left:52%; transform:translateX(-50%) rotate(90deg) scale(.8); transform-origin:center;}
  .sc-fig svg{height:326px; width:auto; display:block; filter:drop-shadow(0 4px 6px #000);}
  .sc-actor{position:absolute; bottom:2px; z-index:5;}
  .sc-actor svg{height:100%; width:auto; display:block; filter:drop-shadow(0 3px 4px #000);}
  .sc-prop{position:absolute; z-index:6; font-size:30px; filter:drop-shadow(0 2px 2px #000);}
  .scap{position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(22,6,6,.9);
    border:2px solid var(--gold); color:var(--gold-lt); padding:6px 18px; border-radius:4px; font-size:14px; white-space:nowrap; z-index:7;}
  .pcls{position:absolute; inset:0; z-index:4; pointer-events:none;}
  .pcl{position:absolute; font-size:20px; animation:floatUp 1.7s linear infinite;}
  @keyframes floatUp{0%{transform:translateY(20px) scale(.5);opacity:0}25%{opacity:1}100%{transform:translateY(-150px) scale(1.15);opacity:0}}
  .sbob{animation:sbob .9s ease-in-out infinite;}
  @keyframes sbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .sdance{animation:sdance .5s ease-in-out infinite;}
  @keyframes sdance{0%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}100%{transform:rotate(-6deg)}}
  .ssleep{animation:sbreathe 2.4s ease-in-out infinite;}
  .sbreathe2{animation:sbreathe 2s ease-in-out infinite;}
  @keyframes sbreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
  .slift{animation:slift .7s ease-in-out infinite;}
  @keyframes slift{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  .p-bob{animation:sbob 1s ease-in-out infinite;}
  .p-brush{animation:pbrush .5s ease-in-out infinite;}
  @keyframes pbrush{0%,100%{transform:translate(0,0) rotate(-8deg)}50%{transform:translate(-4px,3px) rotate(8deg)}}
  .scene.sflash::after{content:""; position:absolute; inset:0; background:#fff; opacity:0; z-index:8; animation:sflash 1.1s ease-in-out infinite;}
  @keyframes sflash{0%,78%,100%{opacity:0}84%{opacity:.5}}

  /* ===== SPECIAL EVENT MODAL ===== */
  .event-layer{position:fixed; inset:0; background:rgba(8,3,3,.84); z-index:100; display:none; align-items:center; justify-content:center; padding:14px;}
  .event-layer.show{display:flex;}
  .event-box{width:min(560px,100%); max-height:94vh; overflow:auto; padding:14px;}
  .event-title{color:var(--gold-lt); font-size:16px; text-align:center; border-bottom:2px solid var(--gold-dk); padding-bottom:6px; margin-bottom:9px; letter-spacing:1px;}
  .event-scene{margin-bottom:10px;}
  .event-text{background:#160606; border:1px solid var(--gold-dk); border-radius:4px; padding:10px 12px; font-size:13px; line-height:1.75; color:#ffeede; min-height:54px;}
  .event-text .plus{color:#7be08a;} .event-text .minus{color:#ff8f8f;} .event-text b{color:#ffd98a;}
  .event-choices{display:flex; flex-wrap:wrap; gap:8px; margin-top:11px; justify-content:center;}
  .ev-btn{cursor:pointer; background:linear-gradient(180deg,#7a2020,#4a1010); color:var(--gold-lt); border:2px solid var(--gold);
    box-shadow:inset 0 0 0 2px var(--gold-dk); border-radius:4px; font-family:inherit; font-size:13px; padding:8px 14px;
    display:flex; flex-direction:column; align-items:center; transition:transform .07s;}
  .ev-btn small{color:#e8c9a0; font-size:10px; margin-top:2px;}
  .ev-btn:hover:not(:disabled){transform:translateY(-2px);}
  .ev-btn:active:not(:disabled){transform:translateY(1px);}
  .ev-btn:disabled{opacity:.4; cursor:not-allowed; filter:grayscale(.5);}
  .ev-stagewrap{position:relative; height:190px; border-radius:6px; overflow:hidden; border:2px solid var(--gold-dk); background:#0a0608;}
  .ev-bg{position:absolute; inset:0; width:100%; height:100%;}
  .ev-hero{position:absolute; left:50%; bottom:-26px; transform:translateX(-50%); z-index:2;}
  .ev-hero svg{height:200px; width:auto; filter:drop-shadow(0 3px 4px #000);}
  .ev-hero.bob{animation:sbob 1s ease-in-out infinite;}
  .ev-foe{position:absolute; right:13%; bottom:46px; font-size:44px; z-index:3; animation:sbob 1.1s ease-in-out infinite; filter:drop-shadow(0 2px 3px #000);}
  .ev-badge{position:absolute; top:8px; right:10px; background:rgba(22,6,6,.85); border:1.5px solid var(--gold); color:var(--gold-lt); padding:3px 10px; border-radius:4px; font-size:12px; z-index:5;}
  .gridwrap{display:flex; justify-content:center; padding:6px 6px 2px;}
  .grid5{display:grid; gap:4px; width:230px;}
  .gcell{aspect-ratio:1; background:#241830; border:1px solid #4a2a50; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:17px;}
  .gcell.me{background:#ff5fa0; box-shadow:0 0 7px #ff5fa0;}
  .gcell.done{background:#3a2448;}

  /* ===== COMMAND MENU ===== */
  .menu{position:absolute; left:8px; bottom:8px; z-index:5; width:206px;
    background:linear-gradient(180deg,#1e0808f2,#120404f2); border:2px solid var(--gold);
    box-shadow:inset 0 0 0 2px var(--gold-dk), 0 4px 10px #000; border-radius:4px; padding:6px;}
  .menu .mhead{color:var(--gold-lt); font-size:12px; text-align:center; padding:2px 0 5px; border-bottom:1px solid var(--gold-dk); margin-bottom:5px;}
  .menu .mi{display:block; width:100%; text-align:left; background:transparent; border:none; color:var(--parch);
    font-size:12.5px; padding:5px 8px; cursor:pointer; border-radius:2px; position:relative;}
  .menu .mi:hover:not(:disabled){background:linear-gradient(90deg,#7a1e1e,#4a1010); color:var(--gold-lt);}
  .menu .mi:hover:not(:disabled)::before{content:"▶"; position:absolute; left:-1px; color:var(--gold-lt); font-size:10px;}
  .menu .mi:disabled{color:#6a4a4a; cursor:not-allowed;}
  .menu .mi .c{position:absolute; right:8px; font-size:11px;}
  .menu .mi .c.earn{color:#7be08a;} .menu .mi .c.spend{color:#ff9a9a;}
  .menu .mi .lk{display:block; font-size:10px; color:#b5726a;}
  .menu .mdesc{font-size:10.5px; color:#e8c9a0; padding:5px 6px 2px; line-height:1.5; min-height:34px;}
  .menu .back{color:#ffb0b0; font-size:11px;}

  /* ===== STATS (right) ===== */
  .statpanel{padding:7px 8px;}
  .statpanel h4{color:var(--gold-lt); font-size:12px; text-align:center; padding-bottom:5px; margin-bottom:5px;
    border-bottom:1px solid var(--gold-dk); letter-spacing:1px;}
  .srow{display:grid; grid-template-columns:58px 30px 1fr; align-items:center; gap:3px; margin:3px 0;}
  .srow .lab{background:linear-gradient(180deg,var(--parch),var(--parch-dk)); color:var(--inkred);
    font-size:11px; text-align:center; border:1px solid var(--gold-dk); border-radius:2px; padding:1px 0;}
  .srow .num{background:#1a0606; color:var(--gold-lt); font-size:12px; text-align:right; padding:1px 4px;
    border:1px solid #3a1010; border-radius:2px;}
  .srow .num.warn{color:#ff7a7a;}
  .srow .bar{height:12px; background:#2a0808; border:1px solid #3a1010; border-radius:2px; overflow:hidden;}
  .srow .bar>span{display:block; height:100%; background:linear-gradient(180deg,#ff5a5a,var(--redbar) 40%,var(--redbar-dk));
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.25); transition:width .5s cubic-bezier(.2,1,.3,1);}
  .srow .bar>span.stress{background:linear-gradient(180deg,#ffcf6a,#e49a23 50%,#8a5a10);}
  .srow .dl{font-size:10px; margin-left:2px;}
  .srow .dl.up{color:#7be08a;} .srow .dl.down{color:#ff8f8f;}

  /* ===== START / ENDING ===== */
  .overlay-screen{width:min(680px,100%);}
  .center-card{padding:22px; text-align:center;}
  .center-card h1{color:var(--gold-lt); font-size:24px; margin-bottom:6px; text-shadow:0 2px 0 #000;}
  .center-card h1 small{display:block; color:#ffb0c8; font-size:13px; margin-top:4px;}
  .center-card p{color:#ffe4c8; font-size:13px; line-height:1.9; margin:12px auto; max-width:560px;}
  .pm-btn{cursor:pointer; background:linear-gradient(180deg,#7a2020,#4a1010); color:var(--gold-lt);
    border:2px solid var(--gold); box-shadow:inset 0 0 0 2px var(--gold-dk), 0 3px 0 #000; border-radius:4px;
    font-size:15px; padding:11px 26px; letter-spacing:1px; transition:transform .07s;}
  .pm-btn:hover{transform:translateY(-2px); color:var(--gold-lt);}
  .pm-btn:active{transform:translateY(2px);}
  .nrow{margin:16px 0; display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap;}
  .nrow input{font-family:inherit; font-size:15px; padding:9px 14px; width:180px; text-align:center;
    background:#1a0606; color:var(--gold-lt); border:2px solid var(--gold-dk); border-radius:3px; outline:none;}
  .nrow input:focus{border-color:var(--gold);}
  .nrow label{color:var(--gold-lt); font-size:13px;}
  #ending .rank{font-size:52px; color:var(--gold-lt); text-shadow:0 0 14px var(--gold); margin:6px 0;}
  #ending .etitle{font-size:22px; color:#ffcf6a; margin:6px 0;}
  #ending .eav svg{height:230px; width:auto;}
  .fstats{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:14px 0;}
  .fstats .fs{background:#1a0606; border:1px solid var(--gold-dk); border-radius:3px; padding:5px 9px;
    font-size:12px; color:var(--parch);}
  .fstats .fs b{color:var(--gold-lt);}

  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(14px);
    background:#1a0606; color:var(--gold-lt); border:2px solid var(--gold); box-shadow:0 6px 18px #000;
    padding:9px 18px; border-radius:4px; font-size:13px; opacity:0; transition:.22s; pointer-events:none; z-index:60;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ===== 배경음악 컨트롤 ===== */
  .bgm-ctrl{position:fixed; top:8px; right:8px; z-index:120; display:flex; align-items:center; gap:6px;
    background:rgba(22,6,6,.82); border:2px solid var(--gold-dk); border-radius:999px; padding:4px 12px 4px 8px;
    box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .bgm-ctrl button{background:none; border:none; cursor:pointer; font-size:19px; line-height:1; padding:0;}
  .bgm-ctrl input[type=range]{width:86px; accent-color:var(--gold); cursor:pointer;}

  /* 몬스터(동아리 학생·서예 선생님) 초상 */
  .ev-foe svg{height:132px; width:auto; display:block;}

  /* ===== 반응형: 태블릿 / 스마트폰 (base 규칙보다 뒤에 두어 우선 적용) ===== */
  @media(max-width:900px){
    .menu .mi{font-size:13px; padding:8px 10px;}
    .tab{padding:9px 14px; font-size:13px;}
    .srow{grid-template-columns:56px 30px 1fr;}
  }
  @media(max-width:520px){
    body{padding:8px;}
    header{padding:12px 14px;}
    header h1{font-size:16px;}
    header .tag{display:none;}
    .room{height:clamp(380px,118vw,440px);}
    .room .avatar-holder canvas, .room .avatar-holder svg{height:clamp(360px,112vw,420px);}

<script>
/* =========================================================
   갸루 메이커 (프린세스 메이커 2 스타일 UI)
   ========================================================= */
const MAX_MONTH=24, BASE_YEAR=2026, START_AGE=16;
const clamp=(v,mn=0,mx=100)=>Math.max(mn,Math.min(mx,v));
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const won=n=>n.toLocaleString('ko-KR');

/* =========================================================
   배경음악 (Web Audio로 직접 합성 · 작곡한 7개 루프 + 드럼)
   ========================================================= */
const NF={A2:110.00,B2:123.47,C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.50,R:0};
const TRACKS={
  main:{bpm:108,wave:'triangle',mel:"E4 G4 C5 G4 A4 C5 E5 C5 D5 B4 G4 D5 C5 G4 E4 R",bass:"C3 C3 A2 A2 F3 F3 G3 G3"},
  work:{bpm:126,wave:'square',mel:"C5 E5 G5 E5 C5 E5 A4 C5 F5 A4 F5 A4 G4 B4 D5 R",bass:"C3 G3 C3 G3 F3 C3 G3 G3"},
  cute:{bpm:116,wave:'triangle',mel:"C5 E5 A5 E5 F5 A5 G5 E5 D5 F5 A5 F5 E5 C5 D5 R",bass:"F3 A3 C3 A3 F3 G3 C3 G3"},
  calm:{bpm:94,wave:'sine',mel:"C5 R E5 R G4 A4 G4 R E5 R D5 R C5 R G4 R",bass:"C3 A2 F3 G3 C3 A2 F3 G3"},
  party:{bpm:132,wave:'sawtooth',mel:"A4 C5 E5 C5 A4 C5 D5 C5 E5 C5 A4 C5 G4 B4 D5 R",bass:"A2 A2 F3 F3 C3 C3 G3 G3"},
  battle:{bpm:142,wave:'square',mel:"A4 A4 C5 A4 B4 A4 G4 A4 E5 D5 C5 B4 A4 B4 C5 R",bass:"A2 A2 A2 A2 F3 F3 G3 G3"},
  idol:{bpm:122,wave:'square',mel:"G5 E5 C5 E5 G5 C6 A5 G5 F5 A5 G5 E5 D5 E5 C5 R",bass:"C3 C3 G3 G3 A3 A3 F3 G3"}
};
const CAT_THEME={work:'work',beauty:'cute',train:'calm',play:'party'};
function themeForAct(a){ for(const c in ACTIONS){ if(ACTIONS[c].some(x=>x.id===a.id)) return CAT_THEME[c]; } return 'main'; }
const BGM={
  ctx:null, master:null, filt:null, cur:null, playing:false, timer:null, vol:0.4, muted:false,
  _ok(){ return typeof window!=='undefined' && (window.AudioContext||window.webkitAudioContext); },
  init(){ if(this.ctx||!this._ok())return; try{
      const AC=window.AudioContext||window.webkitAudioContext; this.ctx=new AC();
      this.master=this.ctx.createGain(); this.master.gain.value=this.muted?0:this.vol;
      this.filt=this.ctx.createBiquadFilter(); this.filt.type='lowpass'; this.filt.frequency.value=3600;
      this.master.connect(this.filt); this.filt.connect(this.ctx.destination);
    }catch(e){ this.ctx=null; } },
  setVol(v){ this.vol=v; if(this.master&&!this.muted) this.master.gain.value=v; },
  toggle(){ this.muted=!this.muted; if(this.master) this.master.gain.value=this.muted?0:this.vol; return !this.muted; },
  play(name){ if(!this._ok())return; this.init(); if(!this.ctx)return;
    if(this.ctx.state==='suspended') this.ctx.resume();
    if(this.cur===name&&this.playing) return;
    this.cur=name; if(!this.playing){ this.playing=true; this._loop(); } },
  stop(){ this.playing=false; clearTimeout(this.timer); },
  _loop(){ if(!this.playing||!this.ctx)return; try{
      const t=TRACKS[this.cur]||TRACKS.main, ctx=this.ctx, beat=60/t.bpm, start=ctx.currentTime+0.06;
      const mel=t.mel.split(' '), bass=t.bass.split(' ');
      mel.forEach((n,i)=>{ if(NF[n]) this._voice(NF[n], start+i*beat*0.5, beat*0.5*0.9, t.wave, 0.14); });
      bass.forEach((n,i)=>{ if(NF[n]) this._voice(NF[n], start+i*beat, beat*0.92, 'triangle', 0.12); });
      const beats=Math.round(mel.length*0.5);
      for(let i=0;i<beats;i++){ this._kick(start+i*beat); this._hat(start+(i+0.5)*beat); }
      this.timer=setTimeout(()=>this._loop(), Math.max(300, beats*beat*1000-40));
    }catch(e){} },
  _voice(f,t,d,w,g){ const c=this.ctx,o=c.createOscillator(),a=c.createGain(); o.type=w||'square'; o.frequency.value=f;
    a.gain.setValueAtTime(0.0001,t); a.gain.linearRampToValueAtTime(g,t+0.015); a.gain.exponentialRampToValueAtTime(0.0006,t+d);
    o.connect(a); a.connect(this.master); o.start(t); o.stop(t+d+0.02); },
  _kick(t){ const c=this.ctx,o=c.createOscillator(),g=c.createGain(); o.type='sine';
    o.frequency.setValueAtTime(155,t); o.frequency.exponentialRampToValueAtTime(48,t+0.12);
    g.gain.setValueAtTime(0.24,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.16); },
  _hat(t){ const c=this.ctx,b=c.createBuffer(1,256,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<256;i++)d[i]=Math.random()*2-1; const s=c.createBufferSource(); s.buffer=b;
    const g=c.createGain(); g.gain.setValueAtTime(0.045,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    const f=c.createBiquadFilter(); f.type='highpass'; f.frequency.value=7200;
    s.connect(f); f.connect(g); g.connect(this.master); s.start(t); s.stop(t+0.05); }
};

const STAT_META={
  fashion:{label:'패션',},charisma:{label:'카리스마'},stamina:{label:'체력'},
  intel:{label:'지성'},charm:{label:'매력'},popularity:{label:'인기'}
};

let S;
function newState(name){
  return {
    name:name||'미나', month:1,
    stats:{fashion:10,charisma:10,stamina:30,intel:15,charm:15,dance:10,popularity:5},
    stress:15, money:30000, lastDelta:{}, log:[], menu:'root', lastIcon:'', stars:0,
    weekPlan:[]
  };
}
function ageNow(){ return START_AGE + Math.floor((S.month-1)/12); }
function dateNow(){ const y=BASE_YEAR+Math.floor((S.month-1)/12), m=((S.month-1)%12)+1; return {y,m}; }

/* ---------- ACTIONS ---------- */
const ACTIONS={
  work:[
    {id:'cafe',an:'☕ 카페 알바',ad:'무난하게 용돈 벌기. 살짝 지침.',money:+22000,base:{stamina:+2},stress:+6},
    {id:'store',an:'🌙 편의점 야간',ad:'돈은 쏠쏠하지만 밤샘은 힘들어…',money:+38000,base:{stamina:-4},stress:+12},
    {id:'model',an:'📸 모델 알바',ad:'패션 50↑ 필요. 큰 수입 + 인기!',req:s=>s.stats.fashion>=50,reqTxt:'패션 50 필요',money:+55000,base:{popularity:+6,charm:+2},stress:+8},
    {id:'nailshop',an:'💅 네일샵 어시',ad:'매력 50↑ 필요. 일하며 감각 UP.',req:s=>s.stats.charm>=50,reqTxt:'매력 50 필요',money:+30000,base:{fashion:+3,charm:+1},stress:+5},
  ],
  beauty:[
    {id:'nail',an:'💅 네일 아트 학원',ad:'화려한 갸루 네일 배우기.',money:-18000,base:{fashion:+7,charm:+2},stress:+3},
    {id:'tan',an:'🌞 태닝샵',ad:'은은한 건강 광채로 갸루 오라 UP.',money:-15000,base:{charisma:+6,charm:+3},stress:+2},
    {id:'hair',an:'💇 헤어&메이크업',ad:'볼륨 헤어 + 데카메 메이크.',money:-22000,base:{fashion:+6,charm:+4},stress:+3},
    {id:'shop',an:'🛍️ 109 쇼핑',ad:'최신 갸루룩 득템! 스트레스 해소.',money:-25000,base:{fashion:+5},stress:-10},
  ],
  train:[
    {id:'dance',an:'💃 댄스 학원',ad:'파라파라! 댄스력·체력·매력.',money:-16000,base:{dance:+6,stamina:+3,charm:+2,charisma:+2},stress:+5},
    {id:'gym',an:'🏋️ 헬스장',ad:'탄탄한 몸매 + 스트레스 발산.',money:-12000,base:{stamina:+7},stress:-5},
    {id:'study',an:'📖 독서실 공부',ad:'갸루도 머리는 좋아야지. 지성 UP.',money:-5000,base:{intel:+8},stress:+8},
    {id:'etiquette',an:'🎀 매너 스쿨',ad:'말투·품격 교정. 지성 + 매력.',money:-14000,base:{intel:+4,charm:+3},stress:+4},
  ],
  play:[
    {id:'club',an:'🎉 클럽/파티',ad:'갸루 서클과 밤샘! 카리스마·인기↑.',money:-20000,base:{charisma:+7,popularity:+5,charm:+2},stress:-8},
    {id:'karaoke',an:'🎤 노래방',ad:'친구들과 스트레스 훌훌~',money:-9000,base:{charm:+2},stress:-12},
    {id:'sns',an:'📱 SNS 라이브',ad:'인기=패션·매력 비례. 광고 수익!',dynamic:true,stress:+3},
    {id:'rest',an:'🛏️ 집에서 휴식',ad:'푹 자고 재충전. 스트레스 크게↓.',money:0,base:{stamina:+2},stress:-22},
  ],
};
const TAB_META={work:'일하러 보낸다',beauty:'꾸미러 보낸다',train:'배우러 보낸다',play:'놀러 보낸다'};

/* ---------- EVENTS ---------- */
const EVENTS=[
  {id:'scout',when:s=>s.stats.fashion>=40&&Math.random()<0.22,run:s=>{const p=rnd(4,8);s.stats.popularity=clamp(s.stats.popularity+p);return `길거리에서 <b>기획사 캐스팅</b>! 인기 <span class="plus">+${p}</span>`;}},
  {id:'gift',when:s=>Math.random()<0.16,run:s=>{const m=rnd(10,30)*1000;s.money+=m;return `할머니가 용돈을 주셨다! <span class="plus">+${won(m)}G</span>`;}},
  {id:'circle',when:s=>s.stats.charisma>=30&&Math.random()<0.18,run:s=>{const c=rnd(3,6);s.stats.charisma=clamp(s.stats.charisma+c);s.stress=clamp(s.stress-6);return `<b>갸루 서클</b> 초대! 카리스마 <span class="plus">+${c}</span>`;}},
  {id:'cold',when:s=>s.stress>=70&&Math.random()<0.5,run:s=>{const d=rnd(4,8);s.stats.stamina=clamp(s.stats.stamina-d);s.stress=clamp(s.stress-10);return `무리해서 <b>감기몸살</b>… 체력 <span class="minus">-${d}</span>`;}},
  {id:'burnout',when:s=>s.stress>=90&&Math.random()<0.7,run:s=>{['fashion','charm','popularity'].forEach(k=>s.stats[k]=clamp(s.stats[k]-4));s.stress=clamp(s.stress-25);return `스트레스 폭발로 <b>며칠 잠수…</b> 여러 능력치 <span class="minus">하락</span>`;}},
  {id:'viral',when:s=>s.stats.popularity>=40&&Math.random()<0.2,run:s=>{const p=rnd(5,10),m=rnd(15,40)*1000;s.stats.popularity=clamp(s.stats.popularity+p);s.money+=m;return `갸루룩 사진이 <b>떡상</b>! 인기 <span class="plus">+${p}</span>, <span class="plus">+${won(m)}G</span>`;}},
  {id:'crush',when:s=>s.stats.charm>=35&&Math.random()<0.15,run:s=>{s.stress=clamp(s.stress-10);const c=rnd(2,5);s.stats.charm=clamp(s.stats.charm+c);return `설레는 <b>썸</b> 시작…?! 매력 <span class="plus">+${c}</span>`;}},
  {id:'lost',when:s=>Math.random()<0.1,run:s=>{const m=Math.min(s.money,rnd(5,15)*1000);s.money-=m;return `지갑을 잃어버렸다… <span class="minus">-${won(m)}G</span>`;}},
];

/* ---------- CORE ---------- */
function iconOf(a){ return a.an.trim().split(' ')[0]; }
function applyAction(a){
  const before=snapshot();
  const cost=a.money||0;
  if(cost<0&&S.money+cost<0){ toast('골드가 부족해! 알바부터 뛰자'); return; }
  if(a.req&&!a.req(S)){ toast('아직 조건이 안 됐어~'); return; }

  let extra='';
  if(a.dynamic&&a.id==='sns'){
    const power=S.stats.fashion+S.stats.charm;
    const pop=rnd(2,4)+Math.floor(power/18);
    const earn=Math.floor(S.stats.popularity*rnd(200,400));
    S.stats.popularity=clamp(S.stats.popularity+pop); S.money+=earn;
    extra=` (팔로워 <span class="plus">+${pop}</span>, <span class="plus">+${won(earn)}G</span>)`;
  } else {
    if(a.base) for(const k in a.base) S.stats[k]=clamp((S.stats[k]||0)+vari(a.base[k]));
    S.money+=cost;
  }
  if(typeof a.stress==='number') S.stress=clamp(S.stress+a.stress);

  S.lastIcon=iconOf(a);
  const dline=deltaLine(before);
  pushLog(`이번 달은 <b>${a.an.replace(/^\S+\s/,'')}</b>. ${dline}${extra}`,false);
  S.menu='root';
  advanceMonth();
}
function vari(v){ if(v===0)return 0; const j=Math.random()<0.35?(Math.random()<0.5?1:-1):0; return v>0?v+j:v-j; }

/* ---------- 주간 스케줄 (1주씩 4주 배정 → 한 달 실행, 주당 기존 월단위 성장) ---------- */
function resolveStats(a){
  if(a.dynamic&&a.id==='sns'){
    const power=S.stats.fashion+S.stats.charm;
    const pop=rnd(2,4)+Math.floor(power/18);
    const earn=Math.floor(S.stats.popularity*rnd(200,400));
    S.stats.popularity=clamp(S.stats.popularity+pop); S.money+=earn;
  } else {
    if(a.base) for(const k in a.base) S.stats[k]=clamp((S.stats[k]||0)+vari(a.base[k]));
    S.money=Math.max(0,S.money+(a.money||0));
  }
  if(typeof a.stress==='number') S.stress=clamp(S.stress+a.stress);
}
function assignWeek(a){
  if(S.weekPlan.length>=4) return;
  if(a.req&&!a.req(S)){ toast('아직 조건이 안 됐어~'); return; }
  let proj=S.money; for(const w of S.weekPlan) proj+=(w.money||0);
  if((a.money||0)<0 && proj+(a.money||0)<0){ toast('이번 달 예산 부족! 알바를 먼저 넣자'); return; }
  S.weekPlan.push(a); S.lastIcon=iconOf(a); S.menu='root'; render();
}
function clearWeeks(){ S.weekPlan=[]; S.menu='root'; render(); }
async function executeMonth(){
  if(scenePlaying||S.weekPlan.length<4) return;
  scenePlaying=true;
  const before=snapshot();
  for(let i=0;i<4;i++){ await playWeekScene(S.weekPlan[i], i+1); resolveStats(S.weekPlan[i]); }
  const dline=deltaLine(before);
  pushLog(`📅 이번 달 스케줄 완료! ${dline}`,false);
  S.weekPlan=[]; S.menu='root'; scenePlaying=false;
  BGM.play('main');
  advanceMonth();
}
function playWeekScene(a, wk){
  return new Promise(res=>{
    BGM.play(themeForAct(a));
    const layer=document.getElementById('sceneLayer');
    if(!layer){ res(); return; }
    layer.innerHTML=sceneHTML(a)+`<div class="week-badge">${wk}주차</div>`;
    layer.classList.add('show');
    setTimeout(()=>{ layer.classList.remove('show'); layer.innerHTML=''; res(); }, 1500);
  });
}
function advanceMonth(){
  for(const ev of EVENTS){ if(ev.when(S)){ pushLog('✨ '+ev.run(S),true); break; } }
  S.month++;
  // 스타 슬롯: 6개월마다 성장의 별 획득
  S.stars=Math.min(5,Math.floor((S.month-1)/5));
  if(S.month>MAX_MONTH){ render(); setTimeout(endGame,400); return; }
  render();
}
function snapshot(){ return {stats:{...S.stats},stress:S.stress,money:S.money}; }
function deltaLine(before){
  const NM={fashion:'패션',charisma:'카리스마',stamina:'체력',intel:'지성',charm:'매력',dance:'댄스',popularity:'인기'};
  const parts=[]; S.lastDelta={};
  for(const k in S.stats){ const d=S.stats[k]-before.stats[k]; S.lastDelta[k]=d; if(d) parts.push(`${NM[k]}<span class="${d>0?'plus':'minus'}">${d>0?'+':''}${d}</span>`); }
  const sd=S.stress-before.stress; S.lastDelta.stress=sd; if(sd) parts.push(`스트레스<span class="${sd>0?'minus':'plus'}">${sd>0?'+':''}${sd}</span>`);
  const md=S.money-before.money; if(md) parts.push(`골드<span class="${md>0?'plus':'minus'}">${md>0?'+':''}${won(md)}</span>`);
  return parts.join(' · ');
}

function renderCalendar(){
  const {y,m}=dateNow();
  const first=new Date(y,m-1,1).getDay();
  const days=new Date(y,m,0).getDate();
  const WX=['☀','⛅','☁','🌤','🌦'];
  let cells='';
  const heads=['일','월','화','수','목','금','토'];
  let head=heads.map((d,i)=>`<div class="wd ${i===0?'sun':''}${i===6?'sat':''}">${d}</div>`).join('');
  for(let i=0;i<first;i++) cells+=`<div class="calcell empty"></div>`;
  for(let d=1;d<=days;d++){
    const idx=first+d-1, wd=idx%7, wknd=(wd===0||wd===6), row=Math.floor(idx/7);
    const plan=S.weekPlan[row], cur=(row===S.weekPlan.length && S.weekPlan.length<4);
    let icon, cls;
    if(plan){ icon=iconOf(plan); cls='act'; }
    else { icon=WX[(m*13+d*7)%WX.length]; cls=cur?'cur':(wknd?'wknd':''); }
    cells+=`<div class="calcell ${cls}"><span class="dnum">${d}</span><span class="wx">${icon}</span></div>`;
  }
  document.getElementById('calBox').innerHTML=`
    <div class="caltitle">${y} / ${m}월 · <b style="color:#ffd98a">${S.weekPlan.length}/4주</b></div>

function srow(label,v,delta,stress){
  const w=clamp(v,0,100);
  const dl=delta?`<span class="dl ${ (stress? delta<0:delta>0)?'up':'down'}">${delta>0?'+':''}${delta}</span>`:'';
  const warn=stress&&v>=70?'warn':'';
  return `<div class="srow">
    <span class="lab">${label}</span>
    <span class="num ${warn}">${v}</span>
    <span class="bar"><span class="${stress?'stress':''}" style="width:${w}%"></span></span>
    ${dl?`<span style="grid-column:2/4;font-size:10px;text-align:right">${dl}</span>`:''}
  </div>`;
}

/* ---------- flavor helpers ---------- */
function ageTitle(){
  const top=Math.max(S.stats.charisma,S.stats.fashion,S.stats.popularity);
  if(top<25)return '갸루 지망생'; if(top<50)return '새내기 갸루';
  if(top<75)return '인기 갸루'; return '카리스마 갸루';
}
function catchPhrase(){
  const st=S.stats;
  if(S.stress>=75)return '스트레스 폭발 직전…';
  const m=Math.max(st.fashion,st.charisma,st.charm,st.popularity,st.intel);
  if(m===st.popularity&&m>30)return '떡상 예감!';
  if(m===st.fashion&&m>30)return '패션 완벽해';
  if(m===st.charisma&&m>30)return '카리스마 뿜뿜';
  if(m===st.charm&&m>30)return '오늘도 러블리';
  return '어쨌든 화려하게';
}
function zodiac(){ return ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'][(ageNow())%12]; }
function stewardTip(){
  if(S.money<10000)return '골드가 간당간당해. 알바 좀 뛰자!';
  if(S.stress>=80)return '스트레스가 너무 높아! 좀 쉬게 해줘…';
  if(S.stress>=60)return '슬슬 스트레스 관리가 필요해 보여.';
  if(S.month>=MAX_MONTH-2)return '데뷔가 코앞이야! 마무리 잘하자.';
  return '';
}

function ageStage(s){ const a=START_AGE+Math.floor((s.month-1)/12); return a<=16?0:(a<=17?1:2); }
function beautyTier(s){ const m=Math.max(s.stats.fashion,s.stats.charm); return m>=75?3:(m>=50?2:(m>=25?1:0)); }

  const brace=(x,y)=>`<ellipse cx="${x}" cy="${y}" rx="6.5" ry="3" fill="none" stroke="#ff7fb0" stroke-width="2.6"/><ellipse cx="${x}" cy="${y}" rx="6.5" ry="3" fill="none" stroke="#ffc2dc" stroke-width="1"/>`;

      L=`<path d="M86 126 Q72 150 90 168 L96 162 Q82 148 94 130 Z" fill="${skin}"/>`; lw=[92,166];
      R=`<path d="M134 126 Q148 150 130 168 L124 162 Q138 148 126 130 Z" fill="${skin}"/>`; rw=[128,166]; break;

      L=`<path d="M88 122 Q72 98 78 66 L86 68 Q82 100 96 126 Z" fill="${skin}"/>`; lw=[81,70];
      R=`<path d="M132 122 Q148 98 142 66 L134 68 Q138 100 124 126 Z" fill="${skin}"/>`; rw=[139,70]; break;
    case 'serve':
      L=`<path d="M84 124 Q70 152 76 180 L84 178 Q78 154 92 128 Z" fill="${skin}"/>`; lw=[78,178];
      R=`<path d="M134 124 Q158 130 172 148 L167 156 Q150 140 126 130 Z" fill="${skin}"/>`; rw=[170,152]; break;
    case 'lift':
      L=`<path d="M86 126 Q72 150 90 168 L96 162 Q82 148 94 130 Z" fill="${skin}"/>`; lw=[92,166];
      R=`<path d="M132 120 Q148 98 146 70 L138 70 Q140 100 124 126 Z" fill="${skin}"/>`; rw=[142,74]; break;
    case 'mic':
      L=`<path d="M84 124 Q70 152 76 180 L84 178 Q78 154 92 128 Z" fill="${skin}"/>`; lw=[78,178];
      R=`<path d="M134 122 Q150 106 142 86 L134 90 Q140 108 126 126 Z" fill="${skin}"/>`; rw=[138,88]; break;
    default:
      L=`<path d="M82 120 Q66 150 72 182 L81 179 Q78 152 92 126 Z" fill="${skin}"/>`; lw=[76,180];
      R=`<path d="M138 120 Q154 150 148 182 L139 179 Q142 152 128 126 Z" fill="${skin}"/>`; rw=[144,180];
  }
  const hands=`<circle cx="${lw[0]}" cy="${lw[1]}" r="6" fill="${skin}"/><circle cx="${rw[0]}" cy="${rw[1]}" r="6" fill="${skin}"/>`;

  return {limbs:L+R, ends:hands+brace(lw[0],lw[1])+brace(rw[0],rw[1]), sleeves};

function playScene(a){
  if(scenePlaying) return;

  if(cost<0&&S.money+cost<0){ toast('골드가 부족해! 알바부터 뛰자'); return; }
  if(a.req&&!a.req(S)){ toast('아직 조건이 안 됐어~'); return; }

  if(!layer){ applyAction(a); return; }
  scenePlaying=true;
  layer.innerHTML=sceneHTML(a); layer.classList.add('show');
  setTimeout(()=>{ layer.classList.remove('show'); layer.innerHTML=''; scenePlaying=false; applyAction(a); }, 2600);
}

/* ===== SVG → 캔버스 픽셀화 렌더 (도트 느낌) ===== */
function renderPixel(el, svg, intrinsicW){
  if(typeof Image==='undefined'){ el.innerHTML=svg; return; }
  const img=new Image();
  img.onload=function(){
    try{
      const ratio=(img.naturalHeight/img.naturalWidth)||1.9;
      const c=document.createElement('canvas');
      c.width=intrinsicW; c.height=Math.round(intrinsicW*ratio);
      const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=false;
      ctx.drawImage(img,0,0,c.width,c.height);
      el.innerHTML=''; el.appendChild(c);
    }catch(e){ el.innerHTML=svg; }
  };
  img.onerror=function(){ el.innerHTML=svg; };
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}

const SNAME={fashion:'패션',charisma:'카리스마',stamina:'체력',intel:'지성',charm:'매력',dance:'댄스',popularity:'인기'};
const ITEM_KINDS=[['fashion','반짝이 네일팁'],['charm','명품 링'],['stamina','에너지 드링크'],['intel','갸루 바이블'],['charisma','카리스마 오라'],['dance','댄스 슈즈'],['popularity','인플루언서 뱃지']];
function makeItem(tier){
  const boosts={}, used=[], n=tier>=3?2:1;
  for(let i=0;i<n;i++){ let k; do{k=ITEM_KINDS[rnd(0,ITEM_KINDS.length-1)];}while(used.includes(k[0])); used.push(k[0]); boosts[k[0]]=rnd(2,4)+tier*2; }
  const rar=['✨','💎','👑'][Math.min(2,Math.max(0,tier-1))];
  return {name:`${rar} ${ITEM_KINDS.find(x=>x[0]===used[0])[1]}${n>1?'+':''}`, boosts};
}
function itemDesc(it){ return Object.entries(it.boosts).map(([k,v])=>`${SNAME[k]}+${v}`).join(', '); }
function makeMonster(tier){
  if(tier>=4) return {name:'서예 선생님', type:'calli', diff:18+tier*12+rnd(-5,10), tier};
  const clubs=[['야구부 부원','baseball'],['관현악부 부원','orchestra'],['댄스부 부원','dance']];

  const endings={
    charisma:{t:'👑 카리스마 갸루 여왕',d:'모두가 우러러보는 <b>전설의 카리스마 갸루</b>가 되었다! 시부야 갸루 문화의 아이콘으로 등극.'},
    popularity:{t:'📱 톱 인플루언서',d:'수십만 팔로워의 <b>SNS 스타</b>로 데뷔! 미나의 갸루룩은 그날의 유행이 된다.'},
    fashion:{t:'👗 109 전속 모델',d:'압도적 패션 센스로 <b>109 브랜드 전속 모델</b>이 되었다! 잡지 표지를 장식하는 패셔니스타.'},
    charm:{t:'💗 아이돌 갸루',d:'사랑스러운 매력으로 모두를 사로잡은 <b>아이돌 갸루</b>가 되었다!'},
    intel:{t:'🎓 갸루 사장님',d:'학업까지 놓치지 않은 미나는 <b>갸루 패션 브랜드 CEO</b>가 되었다! 재색을 겸비한 커리어 갸루.'},
    stamina:{t:'💪 댄스 챔피언',d:'지칠 줄 모르는 체력으로 <b>갸루 댄스 대회 챔피언</b>이 되었다!'},
  };
  let title,desc;
  if(rank==='D'){ title='😅 평범한 졸업'; desc='꿈을 향한 여정은 아직 끝나지 않았다. 다음엔 더 화려하게…!'; }
  else{ const e=endings[topKey]||endings.charm; title=e.t; desc=e.d+`<br><br>24개월 성장 종합 랭크: <b style="color:#ffd98a">${rank}</b>`+(rank==='S'?`<br><b style="color:#ffb0c8">✧ 완벽한 밸런스! 진정한 갸루 프린세스! ✧</b>`:''); }
  document.getElementById('game').classList.add('hidden');
  const es=document.getElementById('ending'); es.classList.remove('hidden');
  document.getElementById('endRank').textContent=rank+'급';
  document.getElementById('endRank').style.color={S:'#ff6ab0',A:'#ffd98a',B:'#7be0c0',C:'#ffb06a',D:'#b0a0a0'}[rank];
  document.getElementById('endTitle').innerHTML=title;
  document.getElementById('endDesc').innerHTML=desc;
  document.getElementById('endAvatar').innerHTML=avatarSVG(S);
  const NM={fashion:'패션',charisma:'카리스마',stamina:'체력',intel:'지성',charm:'매력',dance:'댄스',popularity:'인기'};
  document.getElementById('finalStats').innerHTML=Object.keys(NM).map(k=>`<div class="fs">${NM[k]} <b>${st[k]}</b></div>`).join('')+`<div class="fs">골드 <b>${won(S.money)}G</b></div>`;
}

/* ---------- toast ---------- */
let tt; function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1700);}

/* ---------- boot ---------- */
function startGame(){
  const name=(document.getElementById('nameInput').value||'미나').trim().slice(0,8)||'미나';
  S=newState(name);
  document.getElementById('start').classList.add('hidden');
  document.getElementById('ending').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  BGM.play('main');
  render();
}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('restartBtn').onclick=()=>{document.getElementById('ending').classList.add('hidden');document.getElementById('start').classList.remove('hidden');};
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});

/* ---------- 배경음악 컨트롤 (음량/음소거, 설정 저장) ---------- */
(function(){
  const btn=document.getElementById('bgmBtn'), sl=document.getElementById('bgmVol');
  let v=0.4, muted=false;
  try{ const sv=parseFloat(localStorage.getItem('gm_vol')); if(!isNaN(sv))v=sv; muted=localStorage.getItem('gm_mute')==='1'; }catch(e){}
  BGM.vol=v; BGM.muted=muted; sl.value=Math.round(v*100); btn.textContent=muted?'🔇':'🔊';
  sl.addEventListener('input',()=>{ const nv=sl.value/100;
    if(muted){ muted=false; btn.textContent='🔊'; }
    BGM.muted=false; BGM.setVol(nv);
    try{ localStorage.setItem('gm_vol',nv); localStorage.setItem('gm_mute','0'); }catch(e){}
    if(BGM.ctx&&BGM.ctx.state==='suspended') BGM.ctx.resume();
  });
  btn.addEventListener('click',()=>{ const on=BGM.toggle(); muted=!on; btn.textContent=on?'🔊':'🔇';
    try{ localStorage.setItem('gm_mute',on?'0':'1'); }catch(e){}
    if(on&&BGM.ctx&&BGM.ctx.state==='suspended') BGM.ctx.resume();
  });
})();
</script>
